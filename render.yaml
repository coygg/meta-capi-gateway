services:
  - type: web
    name: meta-attribution-gateway
    runtime: docker
    plan: starter
    region: oregon
    autoDeployTrigger: 'off'
    healthCheckPath: /health
    disk:
      name: gateway-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/gateway.sqlite
      - key: GATEWAY_CNAME_TARGET
        value: ''
      - key: COOKIE_SECURE
        value: true
      - key: TRUST_PROXY
        value: true
